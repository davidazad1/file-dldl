name: Download, Split, Encrypt & Push

on:
  workflow_dispatch:

jobs:
  process:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests cryptography

      # Increase Git buffer for large pushes (still safe because each chunk <100MB)
      - name: Configure Git buffer
        run: git config --global http.postBuffer 157286400  # 150MB

      - name: Run download, split, encrypt and push
        env:
          SECRET_DOWNLOAD_URL: ${{ secrets.SECRET_DOWNLOAD_URL }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          OUTPUT_PREFIX: "video_chunk"
        run: python .github/scripts/download_split_encrypt_push.py
